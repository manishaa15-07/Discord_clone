version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  database:
    image: postgres:13
    environment:
      - POSTGRES_USER=chatuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=chatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  server-a:
    build: .
    environment:
      - SERVER_ID=A
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - DB_HOST=database
      - DB_USER=chatuser
      - DB_PASSWORD=password
      - DB_NAME=chatdb
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - database

  server-b:
    build: .
    environment:
      - SERVER_ID=B
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - DB_HOST=database
      - DB_USER=chatuser
      - DB_PASSWORD=password
      - DB_NAME=chatdb
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - database

volumes:
  pgdata:
